services:
  n8n:
    image: n8nio/n8n:1.114.3
    container_name: divination-n8n
    restart: unless-stopped

    ports:
      - "5678:5678"

    environment:
      TZ: Asia/Taipei
      GENERIC_TIMEZONE: Asia/Taipei

      N8N_HOST: localhost
      N8N_PORT: 5678
      N8N_PROTOCOL: http
      WEBHOOK_URL: http://localhost:5678/
      N8N_SECURE_COOKIE: "false"

      # n8n 內部用來加密 credentials 的 key，正式使用請換成長且隨機的字串
      N8N_ENCRYPTION_KEY: your-long-random-key

      # 以下變數名稱需與 workflow 內的 $env.* 一致
      PUBLIC_BASE_URL: https://pub-e3d9bac061fa4ec797d7dbeb52dd445d.r2.dev/
      Img_R2_Path: divination
      R2_Worker_Token: Hello
      R2_Worker_Url: https://divination.cooldas6688.workers.dev/
      Line_Access_Token: your-line-channel-access-token

    volumes:
      - ./data/n8n:/home/node/.n8n
